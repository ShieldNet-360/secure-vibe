# Winget manifest for secure-vibe.
#
# To submit:
#   1. Update PackageVersion to match the release tag.
#   2. Replace InstallerUrl and InstallerSha256 with the MSI URL and SHA-256.
#   3. Run: winget validate --manifest .
#   4. Open a PR against microsoft/winget-pkgs with this file split into the
#      three required manifest files (installer, defaultLocale, version).
PackageIdentifier: shieldnet-360.secure-vibe
PackageVersion: 0.0.0
PackageLocale: en-US
