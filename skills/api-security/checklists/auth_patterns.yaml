schema_version: "1.0"
framework: "OWASP API Security Top 10 2023 + OAuth 2.0 BCP"
last_updated: "2026-07-02"
patterns:
  - id: api-auth-required-default
    severity: critical
    rule: "Default to authenticated routes; explicitly mark public routes"
    enforcement: "Use a middleware that requires auth unless route is annotated public"
  - id: api-bola-object-auth
    severity: critical
    rule: "Object-level authorization: confirm subject has access to specific resource ID, not just any resource of that type"
    cwe: 639
  - id: api-jwt-pin-alg
    severity: critical
    rule: "Pin JWT algorithm at verification; never accept 'none'"
  - id: api-jwt-short-ttl
    severity: high
    rule: "Access tokens have TTL ≤ 1 hour; use refresh tokens for longer sessions"
  - id: api-rate-limit-auth
    severity: high
    rule: "Auth endpoints (login, password reset, OAuth callback) have stricter rate limits than business endpoints"
  - id: api-no-credentials-in-url
    severity: critical
    rule: "Tokens and credentials are never passed in query strings (they leak to logs and Referer headers)"
  - id: api-mfa-for-admin
    severity: high
    rule: "Administrative actions require MFA or step-up authentication"
  - id: api-no-mass-assignment
    severity: high
    rule: "Whitelist fields when binding request body to ORM models"
    cwe: 915
  - id: api-func-authz-shared-write
    severity: high
    rule: "Writes that publish into a shared/global namespace (global gallery, shared catalog, public list) require a function-level role/privilege check, not just authentication — authenticated-but-any-user create of globally-visible content is a stored-payload (XSS/malicious-link) delivery vector"
    cwe: 862
  # --- Object-level-authz false negatives (checks that look like authz but aren't) ---
  - id: api-bola-claimed-actor-not-caller
    severity: critical
    rule: "A check that a request-supplied actor/owner id (a userId/ownerId/senderId/actedBy field in body, path, or query) is a valid participant/member validates the CLAIMED actor, not the caller. Object-level authorization must bind to the gateway-authenticated principal, never to identity echoed back in the request."
    cwe: 639
  - id: api-authz-parent-scope-not-subject
    severity: critical
    rule: "On routes carrying a parent scope plus a subject id (e.g. /orgs/{orgId}/members/{memberId}), authorizing the caller for {orgId} does NOT authorize {memberId}. Verify the subject belongs to that scope — the relationship between the ids — not each id independently."
    cwe: 639
  - id: api-authz-gateway-authn-service-no-authz
    severity: critical
    rule: "When authentication terminates at a gateway/BFF, the downstream service must re-derive the principal from a trusted gateway-injected header and enforce object-level authz itself. An Authorization input left optional/unparsed in the service means it performs no authz and is exploitable by anyone who reaches it (or bypasses the gateway)."
    cwe: 306
  - id: api-authz-streaming-partial
    severity: high
    rule: "Streaming responses (SSE/chunked) commit HTTP 200 before the handler runs, so authorization cannot surface as a 4xx status. Authorize each subscribed subject; an unauthorized subject must receive zero events (empty stream). Do not treat a 200 as proof no data leaked; prefer a pre-stream check that can still return 403/404."
    cwe: 639
  - id: api-authz-broker-producer-trust
    severity: high
    rule: "Async consumers (queue/topic/webhook) must not trust a subject/owner id asserted by the producer. Authenticate the channel (mTLS/ACL) and re-validate that the asserted subject is one the producer was authorized to assert; do not fan out on producer-claimed identity alone."
    cwe: 345
  # --- Rate-limit keying ---
  - id: api-rate-limit-untrusted-client-ip
    severity: high
    rule: "Rate-limit / lockout / anti-bruteforce counters must derive the client IP from a trusted hop, never from a client-settable header. Keying on the leftmost X-Forwarded-For (or a client-supplied Forwarded / X-Real-IP) lets an attacker send a fresh value per request for a new bucket every time, defeating the limit. Use the real peer IP with a configured trusted-proxy depth, or key on the authenticated principal; fail closed if the limiter backend errors."
    cwe: 348
